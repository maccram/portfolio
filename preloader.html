<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading…</title>

    <style>
        /* Local fonts */
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter-300.ttf') format('truetype');
            font-weight: 300;
        }
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter-400.ttf') format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter-500.ttf') format('truetype');
            font-weight: 500;
        }
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter-600.ttf') format('truetype');
            font-weight: 600;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/Outfit-300.ttf') format('truetype');
            font-weight: 300;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/Outfit-400.ttf') format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/Outfit-700.ttf') format('truetype');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/Outfit-900.ttf') format('truetype');
            font-weight: 900;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #111010;
            --text: #D3D5D4;
            --accent: #A20906;
            --dim: rgba(211, 213, 212, 0.4);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Wrapper ── */
        #stage {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Phase 1: WebP image ── */
        #phase-webp {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.55s ease;
        }

        #phase-webp.out {
            opacity: 0;
            pointer-events: none;
        }

        #anim-img {
            display: block;
            width: auto;
            height: auto;
            max-width: min(280px, 60vw);
            max-height: 50vh;
            object-fit: contain;
        }

        /* ── Phase 2: Typewriter ── */
        #phase-type {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 8vw;
            text-align: center;
            opacity: 0;
            transition: opacity 0.55s ease;
        }

        #phase-type.in {
            opacity: 1;
        }

        .pre-rule {
            width: 32px;
            height: 1px;
            background: var(--accent);
            margin: 0 auto 36px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.18, 1) 0.2s;
        }

        #phase-type.in .pre-rule {
            transform: scaleX(1);
        }

        .pre-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.78rem, 1.1vw, 0.95rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            line-height: 1.7;
            color: var(--dim);
            max-width: 620px;
        }

        .pre-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.85s step-end infinite;
        }

        .pre-cursor.done {
            animation: none;
            opacity: 0;
            transition: opacity 0.4s 0.5s;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Whole page fade-out at the very end ── */
        body.exit {
            opacity: 0;
            transition: opacity 0.75s cubic-bezier(0.77, 0, 0.18, 1);
        }
    </style>
</head>

<body>

    <div id="stage">

        <!-- Phase 1 -->
        <div id="phase-webp">
            <img id="anim-img" alt="" />
        </div>

        <!-- Phase 2 -->
        <div id="phase-type">
            <div class="pre-rule"></div>
            <p class="pre-text">
                <span id="pre-typed"></span><span class="pre-cursor" id="pre-cursor"></span>
            </p>
        </div>
        
        <!-- Audio -->
        <audio id="tw-audio" preload="auto">
            <source src="SFX/Typewriter.mov?t=" type="audio/wav">
        </audio>

    </div>

    <script>
        (function () {

            /* ── Config ── */
            const WEBP_SRC = 'PageloaderProres-ezgif.com-video-to-webp-converter.webp';
            const TYPEWRITER_TEXT = 'Ein digitales Erlebnis, gestaltet von Marc Heidinger.';
            const TYPEWRITER_SPEED = 68;   // ms per character
            const HOLD_AFTER_TYPE = 900;  // ms to hold after typing finishes
            const FALLBACK_MS = 3500; // if RIFF parse fails

            /* ── DOM ── */
            const phaseWebp = document.getElementById('phase-webp');
            const phaseType = document.getElementById('phase-type');
            const animImg = document.getElementById('anim-img');
            const typedEl = document.getElementById('pre-typed');
            const cursorEl = document.getElementById('pre-cursor');

            /* ── Guard: only start typewriter once ── */
            let typewriterDone = false;

            /* ────────────────────────────────────────────────────────────
             *  Parse animated WebP RIFF → sum of all ANMF frame durations
             *  Returns total milliseconds, or null on failure.
             * ─────────────────────────────────────────────────────────── */
            function parseWebPTotalMs(buf) {
                try {
                    const v = new DataView(buf);
                    const tag = o => String.fromCharCode(v.getUint8(o), v.getUint8(o + 1), v.getUint8(o + 2), v.getUint8(o + 3));
                    if (tag(0) !== 'RIFF' || tag(8) !== 'WEBP') return null;
                    let total = 0, offset = 12;
                    while (offset + 8 <= v.byteLength) {
                        const id = tag(offset);
                        const size = v.getUint32(offset + 4, true);
                        if (id === 'ANMF' && offset + 23 <= v.byteLength) {
                            const ms = v.getUint8(offset + 20) | (v.getUint8(offset + 21) << 8) | (v.getUint8(offset + 22) << 16);
                            total += ms || 80;
                        }
                        offset += 8 + size + (size & 1);
                    }
                    return total > 0 ? total : null;
                } catch (_) { return null; }
            }

            /* ────────────────────────────────────────────────────────────
             *  Typewriter → then signal the parent frame
             * ─────────────────────────────────────────────────────────── */
            // Preloader typewriter SFX
            const _twAudio = document.getElementById('tw-audio');
            
            function _twFade(target, ms) {
                const start = _twAudio.volume; const steps = 20; const dt = ms / steps; let s = 0;
                const iv = setInterval(() => {
                    s++; _twAudio.volume = Math.max(0, Math.min(1, start + (target - start) * s / steps));
                    if (s >= steps) { clearInterval(iv); if (target === 0) _twAudio.pause(); }
                }, dt);
            }

            function startTypewriter() {
                if (typewriterDone) return;
                typewriterDone = true;

                phaseWebp.classList.add('out');
                phaseType.classList.add('in');

                // start typewriter sound
                _twAudio.currentTime = 0; 
                _twAudio.play().catch(() => {}); 
                _twFade(0.28, 200);

                let i = 0;
                function type() {
                    if (i < TYPEWRITER_TEXT.length) {
                        typedEl.textContent += TYPEWRITER_TEXT[i++];
                        setTimeout(type, TYPEWRITER_SPEED);
                    } else {
                        cursorEl.classList.add('done');
                        _twFade(0, 400);  // fade out when done
                        setTimeout(finish, HOLD_AFTER_TYPE);
                    }
                }
                setTimeout(type, 350);
            }

            function finish() {
                document.body.classList.add('exit');
                setTimeout(() => {
                    // Tell the parent page we're done
                    window.parent.postMessage('preloader:done', '*');
                }, 800);
            }

            /* ────────────────────────────────────────────────────────────
             *  Main: fetch once, parse duration, play via blob URL,
             *  stop after exactly one loop.
             * ─────────────────────────────────────────────────────────── */
            async function run() {
                try {
                    const t0 = performance.now();
                    // Add cache-buster to the fetch URL
                    const buf = await fetch(WEBP_SRC + '?t=' + Date.now()).then(r => {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.arrayBuffer();
                    });
                    
                    // Update audio source with timestamp
                    const audioSource = _twAudio.querySelector('source');
                    if (audioSource) {
                        audioSource.src = 'SFX/Typewriter.mov?t=' + Date.now();
                        _twAudio.load();
                    }

                    const totalMs = parseWebPTotalMs(buf) ?? FALLBACK_MS;
                    console.log('[Preloader] animation duration:', totalMs + 'ms');

                    // Create a blob URL — we control when it stops
                    const blob = new Blob([buf], { type: 'image/webp' });
                    const blobUrl = URL.createObjectURL(blob);

                    // Show animation
                    animImg.src = blobUrl;

                    // How long has already elapsed during fetch?
                    const elapsed = performance.now() - t0;
                    const remaining = Math.max(0, totalMs - elapsed);
                    console.log('[Preloader] remaining after load:', remaining + 'ms');

                    setTimeout(() => {
                        animImg.style.display = 'none'; // hide before clearing src (prevents broken-image box)
                        animImg.src = '';               // stop browser from looping
                        URL.revokeObjectURL(blobUrl);   // free memory
                        startTypewriter();
                    }, remaining);

                } catch (err) {
                    console.error('[Preloader] load error:', err);
                    console.error('[Preloader] failed to fetch:', WEBP_SRC);
                    // Can't load WebP — skip straight to typewriter after a beat
                    setTimeout(startTypewriter, 400);
                }
            }

            run();

        })();
    </script>

</body>

</html>
